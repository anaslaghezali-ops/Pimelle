<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord — Dentelle Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="admin-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__head">
      <a href="index.html" class="sidebar__logo">Dent<span>elle</span></a>
      <p class="sidebar__role">Administration</p>
    </div>
    <nav class="sidebar__nav">
      <a href="admin-dashboard.html" class="active">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Tableau de bord
      </a>
      <a href="admin-commandes.html">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Commandes <span class="badge-count" id="newOrdersBadge" style="display:none"></span>
      </a>
      <a href="admin-produits.html">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Produits
      </a>
      <a href="index.html" target="_blank">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Voir la boutique
      </a>
    </nav>
    <div class="sidebar__footer">
      <button class="btn-logout" onclick="adminLogout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Tableau de bord</h1>
      <span id="adminEmail" style="font-size:.78rem;color:var(--gray)"></span>
    </div>
    <div class="admin-content">

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          </div>
          <p class="stat-card__label">Total commandes</p>
          <p class="stat-card__value" id="statOrders">—</p>
          <p class="stat-card__sub" id="statNewOrders"></p>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <p class="stat-card__label">Chiffre d'affaires</p>
          <p class="stat-card__value" id="statRevenue">—</p>
          <p class="stat-card__sub">Commandes livrées</p>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
          </div>
          <p class="stat-card__label">Produits actifs</p>
          <p class="stat-card__value" id="statProducts">—</p>
          <p class="stat-card__sub" id="statLowStock"></p>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
          </div>
          <p class="stat-card__label">Nouvelles commandes</p>
          <p class="stat-card__value" id="statNew">—</p>
          <p class="stat-card__sub">En attente de traitement</p>
        </div>
      </div>

      <!-- Recent orders -->
      <div class="admin-table-wrap">
        <div class="admin-table-header">
          <h3>Commandes récentes</h3>
          <a href="admin-commandes.html" class="btn btn--outline btn--sm">Voir tout</a>
        </div>
        <table class="admin-table">
          <thead>
            <tr>
              <th>N° Commande</th>
              <th>Cliente</th>
              <th>Total</th>
              <th>Statut</th>
              <th>Date</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="recentOrders"><tr><td colspan="6"><div class="loader"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/admin.js"></script>
<script src="js/orders.js"></script>
<script>
  (async () => {
    const ok = await requireAdmin();
    if (!ok) return;

    const { data: { session } } = await supabase.auth.getSession();
    document.getElementById('adminEmail').textContent = session.user.email;

    // Stats
    const stats = await fetchDashboardStats();
    document.getElementById('statOrders').textContent = stats.totalOrders;
    document.getElementById('statNewOrders').textContent = `${stats.newOrders} nouvelle${stats.newOrders > 1 ? 's' : ''}`;
    document.getElementById('statRevenue').textContent = new Intl.NumberFormat('fr-MA', { style: 'currency', currency: 'MAD' }).format(stats.revenue);
    document.getElementById('statProducts').textContent = stats.totalProducts;
    document.getElementById('statLowStock').textContent = stats.lowStock > 0 ? `⚠ ${stats.lowStock} en stock faible` : '✓ Stocks OK';
    document.getElementById('statNew').textContent = stats.newOrders;

    if (stats.newOrders > 0) {
      const badge = document.getElementById('newOrdersBadge');
      badge.textContent = stats.newOrders;
      badge.style.display = 'inline-flex';
    }

    // Recent orders
    const { orders } = await fetchOrders({ limit: 8 });
    const tbody = document.getElementById('recentOrders');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--gray)">Aucune commande</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr>
        <td><strong>#${o.id.slice(0,8).toUpperCase()}</strong></td>
        <td>${o.customer_first_name} ${o.customer_last_name}</td>
        <td><strong>${new Intl.NumberFormat('fr-MA', { style: 'currency', currency: 'MAD' }).format(o.total_amount)}</strong></td>
        <td>${statusBadge(o.status)}</td>
        <td style="color:var(--gray);font-size:.82rem">${new Date(o.created_at).toLocaleDateString('fr-MA')}</td>
        <td><a href="admin-commandes.html?id=${o.id}" class="action-btn action-btn--view">Détail</a></td>
      </tr>`).join('');
  })();
</script>
</body>
</html>
