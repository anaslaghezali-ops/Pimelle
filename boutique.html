<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique — Dentelle</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="page">

<nav class="nav" id="nav">
  <a href="index.html" class="nav__logo">Dent<span>elle</span></a>
  <ul class="nav__links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="boutique.html" class="active">Boutique</a></li>
  </ul>
  <div class="nav__actions">
    <a href="panier.html" class="nav__cart">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
      <span class="cart-badge"></span>
    </a>
    <button class="nav__burger" id="burger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="nav__mobile" id="mobileNav">
  <a href="index.html">Accueil</a>
  <a href="boutique.html">Boutique</a>
  <a href="panier.html">Mon panier</a>
</div>

<div class="page-header">
  <div class="breadcrumb">
    <a href="index.html">Accueil</a>
    <span>/</span>
    <span>Boutique</span>
  </div>
  <h1>Notre collection</h1>
  <span class="thread"></span>
</div>

<section class="section">
  <div class="container">
    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Rechercher un article…" autocomplete="off">
      <button onclick="triggerSearch()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <div class="shop-layout">
      <!-- Sidebar -->
      <aside class="shop-sidebar">
        <div class="filter-section">
          <h4>Catégories</h4>
          <div id="categoryFilters">
            <label class="filter-option active" data-cat="">
              <input type="radio" name="category" value="" checked> <span>Tout voir</span>
            </label>
          </div>
        </div>
        <div class="filter-section">
          <h4>Prix</h4>
          <label class="filter-option" data-price="">
            <input type="radio" name="price" value="" checked> <span>Tous les prix</span>
          </label>
          <label class="filter-option" data-price="0-200">
            <input type="radio" name="price" value="0-200"> <span>Moins de 200 MAD</span>
          </label>
          <label class="filter-option" data-price="200-400">
            <input type="radio" name="price" value="200-400"> <span>200 – 400 MAD</span>
          </label>
          <label class="filter-option" data-price="400+">
            <input type="radio" name="price" value="400+"> <span>400 MAD et plus</span>
          </label>
        </div>
        <button class="btn btn--outline btn--full" id="resetFilters" style="margin-top:.5rem">Réinitialiser</button>
      </aside>

      <!-- Products -->
      <div>
        <div class="sort-bar">
          <span id="resultCount">Chargement…</span>
          <select id="sortSelect">
            <option value="newest">Plus récents</option>
            <option value="price_asc">Prix croissant</option>
            <option value="price_desc">Prix décroissant</option>
          </select>
        </div>
        <div class="products-grid" id="productsGrid">
          <div class="loader"><div class="spinner"></div></div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer__bottom" style="border-top:none;padding-top:0">
      <span>© 2024 Dentelle.</span>
      <a href="index.html" style="color:var(--mauve)">Retour à l'accueil</a>
    </div>
  </div>
</footer>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
<script>
  let currentPage = 1;
  let currentCat = '';
  let currentSort = 'newest';
  let currentSearch = '';
  let currentPrice = '';
  const LIMIT = 12;

  window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
  });
  document.getElementById('burger').addEventListener('click', () => {
    document.getElementById('mobileNav').classList.toggle('open');
  });

  // URL params
  const params = new URLSearchParams(location.search);
  if (params.get('category')) currentCat = params.get('category');
  if (params.get('search')) {
    currentSearch = params.get('search');
    document.getElementById('searchInput').value = currentSearch;
  }

  async function loadCategories() {
    const cats = await fetchCategories();
    const wrap = document.getElementById('categoryFilters');
    wrap.innerHTML = `<label class="filter-option ${!currentCat ? 'active' : ''}" data-cat="">
      <input type="radio" name="category" value="" ${!currentCat ? 'checked' : ''}> <span>Tout voir</span>
    </label>`;
    cats.forEach(cat => {
      wrap.innerHTML += `<label class="filter-option ${currentCat == cat.id ? 'active' : ''}" data-cat="${cat.id}">
        <input type="radio" name="category" value="${cat.id}" ${currentCat == cat.id ? 'checked' : ''}> <span>${cat.name}</span>
      </label>`;
    });
    wrap.querySelectorAll('.filter-option').forEach(el => {
      el.addEventListener('click', () => {
        currentCat = el.dataset.cat;
        currentPage = 1;
        wrap.querySelectorAll('.filter-option').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        loadProducts();
      });
    });
  }

  async function loadProducts() {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

    let options = { categoryId: currentCat, search: currentSearch, sort: currentSort, page: currentPage, limit: LIMIT };

    // Client-side price filter
    let { products, total } = await fetchProducts(options);

    if (currentPrice) {
      const [min, max] = currentPrice === '400+' ? [400, Infinity] : currentPrice.split('-').map(Number);
      products = products.filter(p => p.price >= min && (max === Infinity || p.price <= max));
    }

    const countEl = document.getElementById('resultCount');
    countEl.textContent = `${total} article${total > 1 ? 's' : ''}`;

    if (!products.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <p>Aucun produit trouvé.</p>
        <button class="btn btn--outline" style="margin-top:1rem" onclick="resetAll()">Réinitialiser les filtres</button>
      </div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = products.map(renderProductCard).join('');

    // Pagination
    const pages = Math.ceil(total / LIMIT);
    renderPagination(pages);
  }

  function renderPagination(pages) {
    const el = document.getElementById('pagination');
    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage - 1})">‹</button>`;
    for (let i = 1; i <= pages; i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    if (currentPage < pages) html += `<button class="page-btn" onclick="goPage(${currentPage + 1})">›</button>`;
    el.innerHTML = html;
  }

  function goPage(n) { currentPage = n; loadProducts(); window.scrollTo(0, 0); }
  function triggerSearch() { currentSearch = document.getElementById('searchInput').value.trim(); currentPage = 1; loadProducts(); }
  function resetAll() {
    currentCat = ''; currentSearch = ''; currentPrice = ''; currentPage = 1;
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('[name=category]')[0].checked = true;
    document.querySelectorAll('[name=price]')[0].checked = true;
    document.querySelectorAll('.filter-option').forEach((el, i) => el.classList.toggle('active', i === 0 || i === (document.querySelectorAll('[data-cat]').length)));
    loadProducts();
  }

  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') triggerSearch(); });
  document.getElementById('sortSelect').addEventListener('change', e => { currentSort = e.target.value; currentPage = 1; loadProducts(); });
  document.getElementById('resetFilters').addEventListener('click', resetAll);

  // Price filters
  document.querySelectorAll('[name=price]').forEach(el => {
    el.addEventListener('change', () => {
      currentPrice = el.value;
      currentPage = 1;
      document.querySelectorAll('[data-price]').forEach(e => e.classList.toggle('active', e.dataset.price === currentPrice));
      loadProducts();
    });
  });

  loadCategories();
  loadProducts();
</script>
</body>
</html>
